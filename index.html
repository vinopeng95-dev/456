<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電影爬蟲系統 - 靜宜大學資管系</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
            padding-bottom: 5px;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.3em;
        }

        .btn {
            display: block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            margin: 20px 0;
            border-radius: 50px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            background: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #ff6b6b;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary:hover {
            background: #ee5a52;
        }

        .btn-green {
            background: #4CAF50;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-green:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕷️ 網路爬蟲</h1>
        <div class="subtitle">靜宜大學資管系 彭韋諾</div>
        
        <h2>🎬 開眼電影網 - 電影爬蟲系統</h2>
        
        <a href="/movie" class="btn">🎬 即時爬蟲顯示電影</a>
        <a href="/spiderMovie" class="btn btn-green">💾 (1) 爬取並存入資料庫</a>
        <a href="/searchMovie" class="btn btn-secondary">🔍 (2) 從資料庫搜尋電影</a>
    </div>
</body>
</html>
